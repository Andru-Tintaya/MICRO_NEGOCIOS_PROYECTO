{% extends "base.html" %}
{% block title %}Recuperar Contraseña - MiZona{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 mt-5">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-key" style="font-size: 3rem; color: #10B981;"></i>
                        <h2 class="fw-bold mt-2" style="color: #1E293B;">Recuperar Contraseña</h2>
                        <p class="text-muted">Te enviaremos un enlace para restablecer tu contraseña</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                <i class="fas fa-envelope me-1 text-success"></i> Email
                            </label>
                            <input type="email" id="email" name="email" class="form-control" 
                                   placeholder="ejemplo@email.com" required>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                            <i class="fas fa-paper-plane me-2"></i> Enviar enlace de recuperación
                        </button>
                    </form>
                    
                    <p class="text-center mt-3 text-muted">
                        ¿Recordaste tu contraseña? 
                        <a href="{{ url_for('auth.login') }}" class="fw-semibold text-decoration-none" style="color: #10B981;">
                            Inicia Sesión
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
