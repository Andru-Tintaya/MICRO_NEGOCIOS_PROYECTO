{% extends "base.html" %}

{% block title %}Recuperar Contraseña - Micro Negocios{% endblock %}

{% block content %}
<div class="auth-container fade-in">
    <div class="auth-logo">
        <i class="fas fa-key"></i>
    </div>
    <h2>Recuperar Contraseña</h2>
    <p class="subtitle">Te enviaremos un enlace para restablecer tu contraseña</p>
    
    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        {{ csrf_token() }}  <!-- <--- AGREGA ESTA LÍNEA -->
        
        <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" name="email" class="form-control" 
                   placeholder="ejemplo@email.com" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-paper-plane"></i> Enviar enlace de recuperación
        </button>
    </form>
    
    <p class="text-center mt-3" style="color: var(--text-secondary);">
        ¿Recordaste tu contraseña? 
        <a href="{{ url_for('auth.login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">
            Inicia Sesión
        </a>
    </p>
</div>
{% endblock %}
