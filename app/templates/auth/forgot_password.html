{% extends "base.html" %}
{% block title %}Recuperar Contraseña - MiZona{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm mt-5">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-key" style="font-size: 3rem; color: #10B981;"></i>
                        <h2 class="mt-2">Recuperar Contraseña</h2>
                        <p class="text-muted">Te enviaremos un enlace para restablecer tu contraseña</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                        {{ csrf_token() }}
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope me-1"></i> Email
                            </label>
                            <input type="email" id="email" name="email" class="form-control" 
                                   placeholder="ejemplo@email.com" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100" style="background: #10B981; border: none;">
                            <i class="fas fa-paper-plane me-2"></i> Enviar enlace de recuperación
                        </button>
                    </form>
                    
                    <p class="text-center mt-3 text-muted">
                        ¿Recordaste tu contraseña? 
                        <a href="{{ url_for('auth.login') }}" style="color: #10B981; font-weight: 600; text-decoration: none;">
                            Inicia Sesión
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
