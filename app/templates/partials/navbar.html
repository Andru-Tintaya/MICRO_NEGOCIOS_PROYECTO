<nav class="navbar" data-aos="fade-down">
    <div class="container">
        <div class="navbar-brand" onclick="location.href='{{ url_for('index') }}'">
            <i class="fas fa-store-alt"></i>
            <span>MiZona</span>
        </div>
        
        <div class="navbar-links" id="navbarLinks">
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('product.list') }}">Productos</a>
            <a href="{{ url_for('order.view_cart') }}" class="cart-link" style="position: relative;">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" style="display: none; position: absolute; top: -5px; right: -8px; background: #EF4444; color: white; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 50%; min-width: 18px; text-align: center;">0</span>
            </a>
            
            {% if session.get('user_id') %}
                <!-- Usuario logueado -->
                {% if session.get('role') == 'admin' %}
                    <a href="{{ url_for('admin.dashboard') }}" class="admin-link">
                        <i class="fas fa-crown"></i> Admin
                    </a>
                {% elif session.get('role') == 'vendedor' %}
                    <a href="{{ url_for('store.dashboard') }}" class="vendor-link">
                        <i class="fas fa-store"></i> Mi Tienda
                    </a>
                {% endif %}
                
                <div class="navbar-dropdown" id="navbarDropdown">
                    <button class="dropdown-toggle" id="dropdownToggle">
                        <img src="{{ current_user.avatar_url or 'https://ui-avatars.com/api/?name=' + session.get('full_name', 'Usuario')|urlencode + '&background=10B981&color=fff&size=32' }}" 
                             alt="{{ session.get('full_name', 'Usuario') }}" class="avatar">
                        <span>{{ session.get('full_name', 'Usuario') }}</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu" style="position: absolute !important; top: 100% !important; right: 0 !important; margin-top: 8px !important; background: white !important; border: 1px solid #E2E8F0 !important; border-radius: 12px !important; box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important; min-width: 220px !important; padding: 8px 0 !important; z-index: 999999 !important; display: none !important;">
                        <a href="{{ url_for('auth.profile') }}"><i class="fas fa-user"></i> Perfil</a>
                        <a href="{{ url_for('favorite.list') }}"><i class="fas fa-heart"></i> Favoritos</a>
                        <a href="{{ url_for('order.list') }}"><i class="fas fa-shopping-bag"></i> Mis Pedidos</a>
                        <a href="{{ url_for('notification.list') }}"><i class="fas fa-bell"></i> Notificaciones</a>
                        <hr>
                        <form method="POST" action="{{ url_for('auth.logout') }}" style="margin: 0; padding: 0;">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="logout-link" style="background: none; border: none; width: 100%; text-align: left; padding: 10px 18px; cursor: pointer; font-size: 0.95rem; color: #EF4444; font-family: inherit; display: flex; align-items: center; gap: 12px;">
                                <i class="fas fa-sign-out-alt" style="width: 20px; text-align: center;"></i> Cerrar Sesión
                            </button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="btn-login">Iniciar Sesión</a>
                <a href="{{ url_for('auth.register') }}" class="btn-register">Registrarse</a>
            {% endif %}
        </div>
        
        <button class="navbar-toggle" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</nav>

<style>
/* ========================================
   NAVBAR - VERSION DEFINITIVA CON FIX
   ======================================== */
.navbar {
    background: white;
    border-bottom: 1px solid #E2E8F0;
    padding: 12px 0;
    position: sticky;
    top: 0;
    z-index: 9999;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.95);
    overflow: visible !important;
}

.navbar .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    overflow: visible !important;
}

.navbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.5rem;
    font-weight: 800;
    color: #10B981;
    cursor: pointer;
    transition: all 0.3s;
}

.navbar-brand:hover {
    transform: scale(1.02);
}

.navbar-brand i {
    font-size: 1.8rem;
    color: #10B981;
}

.navbar-links {
    display: flex;
    align-items: center;
    gap: 20px;
    overflow: visible !important;
}

.navbar-links a {
    font-weight: 500;
    color: #64748B;
    transition: all 0.3s;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;

.navbar-links a:hover {
    color: #10B981;
    background: rgba(16, 185, 129, 0.1);
}

/* Botones de autenticación */
.btn-login {
    color: #10B981 !important;
    border: 2px solid #10B981;
    padding: 8px 20px !important;
    border-radius: 50px !important;
    font-weight: 600 !important;
}

.btn-login:hover {
    background: #10B981 !important;
    color: white !important;
}

.btn-register {
    background: #10B981;
    color: white !important;
    padding: 8px 20px !important;
    border-radius: 50px !important;
    font-weight: 600 !important;
}

.btn-register:hover {
    background: #059669 !important;
    color: white !important;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
}

/* Enlaces de admin y vendedor */
.admin-link, .vendor-link {
    font-weight: 600 !important;
}

.admin-link {
    color: #8B5CF6 !important;
}

.admin-link:hover {
    background: rgba(139, 92, 246, 0.1) !important;
    color: #7C3AED !important;
}

.vendor-link {
    color: #10B981 !important;
}

.vendor-link:hover {
    background: rgba(16, 185, 129, 0.1) !important;
}

/* ========================================
   DROPDOWN - CON ESTILOS FORZADOS
   ======================================== */
.navbar-dropdown {
    position: relative;
    display: inline-block;
    overflow: visible !important;
}

.dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.3s;
    font-weight: 500;
    color: #1E293B;
    font-family: inherit;
    font-size: 1rem;
}

.dropdown-toggle:hover {
    background: rgba(16, 185, 129, 0.1);
}

.dropdown-toggle .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #10B981;
}

.dropdown-toggle span {
    color: #1E293B;
}

.dropdown-toggle i {
    color: #64748B;
    font-size: 0.8rem;
    transition: transform 0.3s;
}

.dropdown-toggle.open i {
    transform: rotate(180deg);
}

/* ✅ DROPDOWN MENU - ESTILOS DIRECTOS */
.dropdown-menu {
    position: absolute !important;
    top: 100% !important;
    right: 0 !important;
    margin-top: 8px !important;
    background: white !important;
    border: 1px solid #E2E8F0 !important;
    border-radius: 12px !important;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
    min-width: 220px !important;
    padding: 8px 0 !important;
    z-index: 999999 !important;
    display: none !important;
    opacity: 0 !important;
    transition: opacity 0.2s ease !important;
}

.dropdown-menu.show {
    display: block !important;
    opacity: 1 !important;
}

.dropdown-menu a {
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    padding: 10px 18px !important;
    color: #1E293B !important;
    transition: all 0.2s !important;
    text-decoration: none !important;
    font-weight: 400 !important;
    font-size: 0.95rem !important;
}

.dropdown-menu a:hover {
    background: #F8FAFC !important;
    color: #10B981 !important;
}

.dropdown-menu a i {
    width: 20px !important;
    text-align: center !important;
    color: #64748B !important;
}

.dropdown-menu a:hover i {
    color: #10B981 !important;
}

.dropdown-menu hr {
    border: none !important;
    border-top: 1px solid #E2E8F0 !important;
    margin: 6px 12px !important;
}

.logout-link {
    color: #EF4444 !important;
}

.logout-link:hover {
    background: #FEE2E2 !important;
    color: #DC2626 !important;
}

.logout-link:hover i {
    color: #DC2626 !important;
}

.navbar-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #1E293B;
    padding: 8px 12px;
}

/* ========================================
   RESPONSIVE
   ======================================== */
@media (max-width: 768px) {
    .navbar-links {
        display: none;
        flex-direction: column;
        width: 100%;
        padding: 16px 0;
        gap: 12px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        margin-top: 12px;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        padding: 20px;
        z-index: 9999;
    }
    
    .navbar-links.active {
        display: flex;
    }
    
    .navbar-toggle {
        display: block;
    }
    
    .navbar-dropdown {
        width: 100%;
    }
    
    .dropdown-menu {
        position: static !important;
        box-shadow: none !important;
        border: none !important;
        padding-left: 20px !important;
        width: 100% !important;
        margin-top: 4px !important;
    }
    
    .dropdown-menu.show {
        display: block !important;
    }
    
    .btn-login, .btn-register {
        width: 100%;
        text-align: center;
    }
}
</style>

<script>
// ============================================
// TOGGLE MENÚ MÓVIL
// ============================================
function toggleMobileMenu() {
    const links = document.getElementById('navbarLinks');
    if (links) {
        links.classList.toggle('active');
    }
}

// Actualizar badge de notificaciones
function updateNotificationBadge() {
    fetch('/api/notifications/unread')
        .then(res => res.json())
        .then(data => {
            const badge = document.getElementById('notificationBadge');
            if (badge) {
                if (data.count > 0) {
                    badge.textContent = data.count;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
        })
        .catch(error => console.error('Error:', error));
}

// ============================================
// TOGGLE DROPDOWN - SOLUCION DEFINITIVA
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    console.log('🚀 Navbar cargado');
    
    // Badge de notificaciones
    updateNotificationBadge();
    setInterval(updateNotificationBadge, 30000);
    
    const dropdownToggle = document.getElementById('dropdownToggle');
    const dropdownMenu = document.getElementById('dropdownMenu');
    
    if (dropdownToggle && dropdownMenu) {
        dropdownToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            e.preventDefault();
            
            if (dropdownMenu.style.display === 'block') {
                dropdownMenu.style.display = 'none';
                this.classList.remove('open');
                console.log('❌ Dropdown CERRADO');
            } else {
                dropdownMenu.style.display = 'block';
                this.classList.add('open');
                console.log('✅ Dropdown ABIERTO');
            }
        });
    }
    
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('navbarDropdown');
        const menu = document.getElementById('dropdownMenu');
        if (dropdown && menu && !dropdown.contains(e.target)) {
            menu.style.display = 'none';
            const toggle = document.getElementById('dropdownToggle');
            if (toggle) {
                toggle.classList.remove('open');
            }
        }
    });
    
    document.querySelectorAll('.navbar-links a').forEach(link => {
        link.addEventListener('click', function() {
            const links = document.getElementById('navbarLinks');
            if (links) {
                links.classList.remove('active');
            }
        });
    });
});
</script>
