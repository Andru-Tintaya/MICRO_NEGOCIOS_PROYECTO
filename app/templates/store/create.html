{% extends "base.html" %}

{% block title %}Crear Tienda - Micro Negocios{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
    <div class="card" style="padding: 2rem;">
        <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">
            <i class="fas fa-store" style="color: var(--primary);"></i>
            Crear Tienda
        </h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            Completa los datos para crear tu tienda y comenzar a vender.
        </p>
        
        <form method="POST" action="{{ url_for('store.create_store') }}" enctype="multipart/form-data">
            <!-- CSRF Token como campo oculto -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="grid grid-2">
                <div class="form-group">
                    <label for="name"><i class="fas fa-store-alt"></i> Nombre de la Tienda *</label>
                    <input type="text" id="name" name="name" class="form-control" 
                           placeholder="Mi Tienda" required>
                </div>
                
                <div class="form-group">
                    <label for="category_id"><i class="fas fa-tag"></i> Categoría</label>
                    <select id="category_id" name="category_id" class="form-control">
                        <option value="">Sin categoría</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description"><i class="fas fa-align-left"></i> Descripción</label>
                <textarea id="description" name="description" class="form-control" 
                          placeholder="Describe tu tienda..." rows="4"></textarea>
            </div>
            
            <div class="grid grid-2">
                <div class="form-group">
                    <label for="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp *</label>
                    <input type="tel" id="whatsapp" name="whatsapp" class="form-control" 
                           placeholder="+59170000000" required>
                </div>
                
                <div class="form-group">
                    <label for="city"><i class="fas fa-city"></i> Ciudad *</label>
                    <input type="text" id="city" name="city" class="form-control" 
                           placeholder="Santa Cruz" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="address"><i class="fas fa-map-marker-alt"></i> Dirección</label>
                <input type="text" id="address" name="address" class="form-control" 
                       placeholder="Calle Principal #123">
            </div>
            
            <div class="grid grid-2">
                <div class="form-group">
                    <label for="logo"><i class="fas fa-image"></i> Logo</label>
                    <input type="file" id="logo" name="logo" class="form-control-file" 
                           accept="image/*">
                    <small style="color: var(--text-muted);">PNG, JPG o WEBP (máx 2MB)</small>
                </div>
                
                <div class="form-group">
                    <label for="banner"><i class="fas fa-image"></i> Banner</label>
                    <input type="file" id="banner" name="banner" class="form-control-file" 
                           accept="image/*">
                    <small style="color: var(--text-muted);">PNG, JPG o WEBP (máx 2MB)</small>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check"></i> Crear Tienda
                </button>
                <a href="{{ url_for('store.dashboard') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
